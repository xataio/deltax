name: PR Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        run: make fmt-check

      - name: Run clippy
        run: make clippy

  unit:
    name: Unit Tests (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        pg: ["17", "18"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run unit tests
        run: make test PG_MAJOR=${{ matrix.pg }}

  integration:
    name: Integration Tests (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        pg: ["17", "18"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests
        run: make integration-test PG_VERSIONS=${{ matrix.pg }}

  correctness:
    name: Correctness Tests (PG 18)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run correctness tests
        run: make correctness PG_MAJOR=18
